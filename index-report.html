<!DOCTYPE html>
<html>
<head>
  <title>Benchmark, Return & Risk Charts</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <style>
    .filter-btn {
      margin: 0 10px;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #E8E9EB;
      cursor: pointer;
      font-weight: 500;
    }
    .active-btn {
      background: #301934;
      color: white;
    }
    #myChart{
      width: 1200px;
      height:400px !important;

    }
  </style>
</head>

<body>

  
  <div style="width: 900px; margin: 40px auto; text-align: center;">

    <div style="text-align: right; margin-bottom: 10px;">
      <button class="filter-btn" onclick="setFilter('6M')">6M</button>
      <button class="filter-btn" onclick="setFilter('1Y')">1Y</button>
      <button class="filter-btn" onclick="setFilter('5Y')">5Y</button>
      <button class="filter-btn active-btn" onclick="setFilter('ALL')">ALL</button>
    </div>

    <canvas id="myChart" style="width:1200px; height:400px;"></canvas>
  </div>

 
  <div style="display: flex; justify-content: center; gap: 80px; margin-top:50px;">
    <div style="width:300px; height:300px;">
      <canvas id="chartReturn" style="width:100%; height:100%;" ></canvas>
    </div>
    <div style="width:300px; height:300px;">
      <canvas id="chartRisk" style="width:100%; height:100%;" ></canvas>
    </div>
  </div>

  <!-- SINGLE JS FILE -->
  <script src="reportChart.js"></script>

</body>
</html>
