<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Index Elevate</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles/style.css" rel="stylesheet">
 
</head>

<body>
  <div class="loginwrapper">
    <div class="loginwrapper-left">
      <div class="loginbg" id="imageContainer"></div>
    </div>
    <div class="loginwrapper-right">
      <div class="loginform">
        <div class="logo mb-4">
          <img src="images/logo.png"  />
        </div>
        <div class="login-title mb-2">Login</div>
        <div class="mb-3 login-form-group">
          <label for="exampleFormControlInput1" class="form-label mb-0 form-label-custom">Email Address</label>
          <input type="email" class="form-control form-control-reset" id="emailField" placeholder="Christian.Bale@companywebsite.com">
        </div>
        <div class="mb-3 login-form-group">
          <label for="exampleFormControlInput1" class="form-label mb-0 form-label-custom">Password</label>
          <input type="password" class="form-control form-control-reset" id="passwordField" placeholder="*********">
        </div>
        <div class="d-flex justify-content-between mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" checked id="checkDefault">
            <label class="form-check-label mb-0 mt-1" for="checkDefault">
              Remember Me
            </label>
          </div>
          <div><a href="#" style="text-decoration: none;">Forgot Password?</a></div>
        </div>
        <div class="mb-3"><button class="btn btn-primary btn-default btn-login" type="submit" onclick=login()>Login</button></div>
        <div class="mb-3">
          <img src="images/or.png">
        </div>
        <div>
          <img src="images/sso-login.png" />
        </div>
      </div>
    </div>
  </div>
   <script>
    function resizeContainer() {
      const container = document.getElementById('imageContainer');
      container.style.height = window.innerHeight + 'px';
    }

    // Set on load
    resizeContainer();

    // Update on window resize
    window.addEventListener('resize', resizeContainer);

  function login() {
  const email = document.getElementById('emailField').value;
  const password = document.getElementById('passwordField').value;

  fetch('http://127.0.0.1:8000/auth/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ username: email, password: password })
  })
  .then(response => {
    if (!response.ok) {
      throw new Error("Login failed with status " + response.status);
    }
    return response.json();
  })
  .then(data => {
    if (data.access) {
      // Save token in localStorage
      localStorage.setItem('access', data.access);
      localStorage.setItem('refresh', data.refresh);
      // Redirect to dashboard
      window.location.href = 'dashboard-new.html';
    } else {
      alert(data.message || "Login failed");
    }
  })
  .catch(error => {
    console.error('Error:', error);
    alert("An error occurred. Please try again.");
  });
}


  </script>
</body>

</html>
