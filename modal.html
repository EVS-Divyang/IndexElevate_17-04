<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="modal fade" id="logModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-light">

      <div class="modal-header">
        <h5 class="modal-title">Calculation in process</h5>
      </div>

      <div class="modal-body">
        <pre id="logs"
          style="
            background:#111;
            color:#0f0;
            padding:15px;
            height:300px;
            overflow-y:auto;
            white-space: pre-wrap;
          ">
Waiting for logs...
        </pre>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your SSE + modal logic -->
<script>
const params = new URLSearchParams(window.location.search);
const jobId = params.get("job_id");

const logsEl = document.getElementById("logs");

const modal = new bootstrap.Modal(document.getElementById("logModal"), {
    backdrop: "static",
    keyboard: false
});
modal.show();

const eventSource = new EventSource(
    `http://127.0.0.1:8000/dashboard/stream-logs/${jobId}`
);

eventSource.onmessage = function (event) {
    if (event.data === "DONE") {
        eventSource.close();
        setTimeout(() => {
            modal.hide();
             modal.hide();
        }, 1500);
        return;
    }

    logsEl.textContent += event.data + "\n";
    logsEl.scrollTop = logsEl.scrollHeight;
};

eventSource.onerror = function () {
    eventSource.close();
};

modalEl.addEventListener("hidden.bs.modal", async () => {
    try {
        const response = await fetch(`http://127.0.0.1:8000/api/report/${jobId}`);
        if (!response.ok) throw new Error("Failed to fetch report");

        const reportData = await response.json();
        console.log("Report fetched:", reportData);


        // Redirect
        window.location.href = "/reports.html";
    } catch (err) {
        console.error("Error fetching report:", err);
        alert("Could not fetch report data.");
    }
});

</script>
</body>
</html>
